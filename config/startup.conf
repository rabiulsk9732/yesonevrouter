# YESRouter Startup Configuration
# Modeled after VPP's /etc/vpp/startup.conf

unix {
    # Run CLI commands from this file after startup
    exec /root/vbng/config/setup.gate

    # Interactive mode
    interactive

    # Don't daemonize
    nodaemon
}

dpdk {
    # Interfaces to bind (PCI addresses)
    # Get PCI IDs with: sudo ./tools/dpdk-devbind.py -s
    dev 0000:00:13.0
    dev 0000:00:14.0

    # Driver to use
    uio-driver vfio-pci
}
