# YESRouter vBNG Configuration File
# Example configuration

# System Settings
hostname = yesrouter-01
log_level = 5
daemonize = false

# Routing Settings
local_as = 65000
router_id = 10.0.0.1

# BNG (Broadband Network Gateway) Settings
pppoe_enabled = true
ipoe_enabled = true
ac_name = YESRouter-AC
pppoe_mtu = 1492
max_sessions = 100000

# CGNAT Settings
cgnat_enabled = false

# QoS Settings
qos_enabled = true

# Firewall Settings
firewall_enabled = true

# Management Settings
rest_api_enabled = true
rest_api_port = 8080
