###############################################################################
# YESRouter vBNG Configuration
# Hardware & Resource Configuration Only
# Runtime config (NAT pools, interfaces, routes) goes in startup.gate
###############################################################################

#------------------------------------------------------------------------------
# CPU Configuration
#------------------------------------------------------------------------------
cpu {
  main-core 0
  corelist-workers 1-20
}

#------------------------------------------------------------------------------
# DPDK / Memory Configuration
#------------------------------------------------------------------------------
dpdk {
  # Physical NICs
  dev 0000:00:13.0 {
    name Gi0/1
    num-rx-queues 1
    num-tx-queues 1
    num-rx-desc 2048
    num-tx-desc 2048
  }
  dev 0000:00:14.0 {
    name Gi0/2
    num-rx-queues 1
    num-tx-queues 1
    num-rx-desc 2048
    num-tx-desc 2048
  }

  socket-mem 8192
  num-mbufs 262144
}

#------------------------------------------------------------------------------
# NAT Performance Tuning
#------------------------------------------------------------------------------
nat {
  workers 20
  max-sessions 4000000
  session-cache-size 256
}

#------------------------------------------------------------------------------
# Unix Settings
#------------------------------------------------------------------------------
unix {
  interactive
  exec startup.gate
  cli-listen /run/yesrouter/cli.sock
  log /var/log/yesrouter.log
}
