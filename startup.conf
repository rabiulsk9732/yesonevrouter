unix {
  interactive
  exec startup.gate
  cli-listen /run/yesrouter/cli.sock
  log /var/log/yesrouter.log
}

dpdk {
  dev 0000:00:13.0 {
    name Gi0/1
    num-rx-queues 8
    num-tx-queues 8
    num-rx-desc 2048
    num-tx-desc 2048
  }
  dev 0000:00:14.0 {
    name Gi0/2
    num-rx-queues 8
    num-tx-queues 8
    num-rx-desc 2048
    num-tx-desc 2048
  }
  socket-mem 8192
  num-mbufs 65536
}

cpu {
  main-core 0
  corelist-workers 1-8
}
